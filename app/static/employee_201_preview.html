<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Employee 201 File - Preview</title>
<style>
    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, Helvetica, sans-serif;
        background: #525659; /* neutral gray, matches typical PDF viewer chrome */
    }

    .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: #2f3336;
        color: #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .topbar .label {
        font-size: 13px;
        opacity: 0.8;
    }

    #download-btn {
        background: #3a9e50;
        color: #fff;
        border: none;
        padding: 8px 18px;
        font-size: 14px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
    }
    #download-btn:disabled {
        background: #5a6165;
        cursor: not-allowed;
        opacity: 0.7;
    }
    #download-btn:not(:disabled):hover {
        background: #33883f;
    }

    .viewer-area {
        position: relative;
        height: calc(100vh - 52px); /* 52px ~= topbar height, adjust if topbar padding changes */
    }

    #pdf-preview {
        display: none;
        width: 100%;
        height: 100%;
        border: none;
    }

    .status {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #eee;
        gap: 14px;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.25);
        border-top-color: #3a9e50;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    #error {
        display: none;
        color: #ff8a8a;
        max-width: 480px;
        text-align: center;
        padding: 0 20px;
    }
</style>
</head>
<body>

<div class="topbar">
    <span class="label">Employee 201 File Preview</span>
    <button id="download-btn" disabled>Download PDF</button>
</div>

<div class="viewer-area">
    <div id="loading" class="status">
        <div class="spinner"></div>
        <div>Generating preview...</div>
    </div>

    <div id="error" class="status"></div>

    <embed id="pdf-preview" type="application/pdf">
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const ermsId = params.get('erms_id');

    const downloadBtn = document.getElementById('download-btn');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const previewEl = document.getElementById('pdf-preview');

    let pdfBlob = null;
    let pdfFilename = 'employee-201.pdf';

    function showError(message) {
        loadingEl.style.display = 'none';
        errorEl.textContent = message;
        errorEl.style.display = 'flex';
    }

    async function loadPdf() {
        if (!ermsId) {
            showError('Missing erms_id in the URL. Expected ?erms_id=12345');
            return;
        }

        try {
            const resp = await fetch(`/employee-201?erms_id=${encodeURIComponent(ermsId)}`);

            if (!resp.ok) {
                let detail = `Request failed (HTTP ${resp.status})`;
                try {
                    const body = await resp.json();
                    if (body && body.detail) detail = body.detail;
                } catch (_) {
                    // response wasn't JSON - keep the generic message
                }
                showError(detail);
                return;
            }

            const filenameHeader = resp.headers.get('X-Filename');
            if (filenameHeader) {
                pdfFilename = decodeURIComponent(filenameHeader);
            }

            pdfBlob = await resp.blob();
            const blobUrl = URL.createObjectURL(pdfBlob);

            previewEl.setAttribute('src', blobUrl);
            previewEl.style.display = 'block';
            loadingEl.style.display = 'none';
            downloadBtn.disabled = false;
        } catch (err) {
            showError('Network error: ' + err.message);
        }
    }

    downloadBtn.addEventListener('click', () => {
        if (!pdfBlob) return; // guard: button should be disabled until this exists, but belt-and-suspenders

        const blobUrl = URL.createObjectURL(pdfBlob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = pdfFilename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
    });

    loadPdf();
</script>

</body>
</html>
